# Example `nodus.toml` for package maintainers
#
# This example is for a repo that publishes its own Nodus package content.
# Maintain the source files in this repo. Nodus will discover them here and
# emit managed runtime outputs for consuming workspaces.
#
# Typical source layout under the package root:
# - `skills/<id>/SKILL.md`
# - `agents/<id>.md`
# - `agents/<id>.codex.toml` for optional Codex-specific metadata
# - `rules/<id>.*`
# - `commands/<id>.*`
#
# Recommended agent shape:
# - keep shared instructions in `agents/security.md`
# - add `agents/security.codex.toml` only for Codex metadata such as `name`,
#   `description`, `model`, `model_reasoning_effort`, or `sandbox_mode`
# - omit `developer_instructions` from `agents/security.codex.toml` when the
#   paired Markdown file should provide the runtime Codex instructions
# - if `developer_instructions` is present in the Codex TOML, that TOML remains
#   the complete Codex source of truth

# Optional manifest version string.
api_version = "1"

# Recommended package metadata.
name = "acme-agent-pack"
version = "0.1.0"

# Publish this repo root during local `nodus sync`.
# Omit or leave `false` when the root should act only as a source package for
# downstream consumers and not write into its own adapter runtime folders.
publish_root = true

# Optional Claude-specific hook compatibility import.
# Use this when the package intentionally ships Claude plugin hook config from
# a `hooks/` folder instead of portable native `[[hooks]]`.
# claude_plugin_hooks = ["hooks/hooks.json"]
#
# Nodus also preserves Claude-native plugin files when this package is imported
# or wrapped as a Claude plugin:
# - `.lsp.json`
# - `monitors/`
# - `bin/`
# - `settings.json`
# - `output-styles/`
# - `themes/`
# Marketplace `mcpServers = "./file.json"` entries are read relative to the
# plugin root.

# Codex dependency hooks declared below as portable `[[hooks]]` are emitted into
# generated Codex plugins. If hook output exists, Nodus adds
# `"hooks": "./hooks/hooks.json"` to `.codex-plugin/plugin.json` and enables
# `features.plugin_hooks` in the consuming workspace `.codex/config.toml`.

# Optional OpenCode-specific plugin hook import.
# Use this when the package needs OpenCode's full native plugin event surface
# instead of portable native `[[hooks]]`.
# opencode_plugin_hooks = ["hooks/nodus-plugin.ts"]

# Optional additive package roots relative to the repo root.
# Nodus always scans the repo root itself, then each configured content root.
# content_roots = ["packages/shared"]

[[managed_exports]]
# Package-owned file exported into consuming workspaces.
# By default this lands under `.nodus/packages/<package-name>/...`.
source = "prompts/review.md"
target = "prompts/review.md"

[[managed_exports]]
# Use project placement only when the package truly needs a project-root path.
source = "docs/reviewer.md"
target = "docs/reviewer.md"
placement = "project"

[[capabilities]]
# Optional capability declarations for tools or actions this package exposes.
id = "shell.exec"
sensitivity = "low"
justification = "Run repository checks and maintenance commands."

[mcp_servers.firebase]
# Packages can publish MCP servers directly from `nodus.toml`.
# Use exactly one of `command` or `url`.
command = "npx"
args = ["-y", "firebase-tools", "mcp", "--dir", "."]
cwd = "."

[mcp_servers.firebase.env]
IS_FIREBASE_MCP = "true"

# [mcp_servers.figma]
# URL-backed MCP server example.
# type = "http"
# url = "https://example.com/mcp"
#
# [mcp_servers.figma.headers]
# Authorization = "Bearer ${FIGMA_TOKEN}"

# Optional package composition when this package re-exports other packages.
# [dependencies.shared]
# github = "acme/shared-prompts"
# tag = "v1.2.3"
# components = ["skills"]
