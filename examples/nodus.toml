# Example `nodus.toml`
#
# This file is intentionally verbose. It shows the real manifest shape Nodus
# understands today and explains when to use each field.
#
# You can start smaller than this. In practice, most consumers only need:
# - `[adapters] enabled = [...]`
# - one or more entries under `[dependencies]`
# - optionally, local-only entries under `[dev-dependencies]`

# Optional manifest version string for your package or workspace metadata.
# Leave it out if you do not need it.
api_version = "1"

# Optional human-readable package or workspace name.
name = "acme-agent-workspace"

# Optional semantic version for the root package itself.
# This is metadata only; dependency pinning still happens per dependency below.
version = "0.1.0"

# Optional additive package source roots relative to the repo root.
# Each listed directory is scanned like another Nodus AI-plugin root and may
# contain its own `skills/`, `agents/`, `rules/`, and `commands/` folders.
content_roots = ["nodus-development"]

# Optional opt-in for publishing this root project's discovered AI assets into
# adapter runtime folders during `nodus sync`.
# Leave this `false` or omit it if the root repo should act only as source for
# downstream consumers.
publish_root = true

[adapters]
# Pick the runtime folders Nodus should manage in this repo.
# Supported values: "agents", "claude", "codex", "copilot", "cursor", "opencode"
#
# Nodus emits only the files needed for the adapters you enable here.
# If you omit this section, Nodus can infer adapters from the repo layout,
# but persisting them keeps sync behavior deterministic in CI and teammates'
# local clones.
enabled = ["codex", "copilot", "claude", "opencode"]

[[capabilities]]
# Optional capability declarations for the root package.
# Use these only if this repo itself is a package that exposes tools or actions.
id = "shell.exec"

# Keep sensitivity low unless the capability truly needs elevated trust.
# Packages that declare "high" sensitivity require explicit approval at sync time.
sensitivity = "high"
justification = "Run repository checks and maintenance commands."

# -----------------------------------------------------------------------------
# Dependency examples
# -----------------------------------------------------------------------------
#
# A dependency alias is your local name for a package.
# Use a short, stable alias because commands like `nodus remove <alias>` and
# `nodus relay <alias>` refer to it.
#
# For each dependency, choose exactly one source:
# - `github = "owner/repo"` for a GitHub repository
# - `url = "https://..."` or another Git URL
# - `path = "relative/path"` for a local checkout
#
# For Git dependencies, choose exactly one ref:
# - `tag = "v1.2.3"` for release-style pinning
# - `branch = "main"` for a moving branch head
# - `revision = "<40-char commit sha>"` for an exact commit

[dependencies]
# This inline-table form is the most common and compact way to declare
# dependencies. It is a good default when you just need to pin packages and do
# not need nested `managed` mappings.

# Common case: consume a GitHub package by tag.
playbook_ios = { github = "wenext-limited/playbook-ios", tag = "v0.6.0" }

# Common case: install only a subset of artifact kinds from a dependency.
# Supported values: "skills", "agents", "rules", "commands"
nodus = { github = "nodus-rs/nodus", tag = "v0.3.2", components = ["skills", "rules"] }

# Common case: local path dependency relative to the repo root.
local_playbook = { path = "vendor/playbook" }

# Common case: follow compatible release tags instead of pinning one exact tag.
axiom = { github = "CharlesWiltgen/Axiom", version = "^2.34.0" }

# Common case: keep a dependency declared but inactive for now.
# Disabled dependencies stay in the manifest, but Nodus skips resolving,
# syncing, and lockfile tracking until you re-enable them.
paused = { github = "acme/paused-package", tag = "v1.0.0", enabled = false }

[dependencies.shared]
# Use the expanded table form when you want more room for comments or when you
# need nested configuration such as `[[dependencies.<alias>.managed]]`.
#
# This local dependency also contributes extra files outside adapter-managed
# runtime folders.
path = "vendor/shared"

[[dependencies.shared.managed]]
# Copy a single file from the dependency into the consuming repo.
#
# `source` is relative to the dependency root.
# `target` is relative to the consuming repo root.
# Both paths must be relative. Absolute paths and `..` are rejected.
source = "prompts/review.md"
target = ".github/prompts/review.md"

[[dependencies.shared.managed]]
# Copy an entire directory tree. Files already tracked by Nodus at this target
# can be updated or pruned later; unrelated unmanaged files are protected.
source = "templates"
target = "docs/templates"

# Important `managed` rules:
# - supported only for direct dependencies declared in the root `nodus.toml`
# - source paths must stay inside the dependency root
# - overlapping managed targets are rejected
# - unmanaged file collisions are rejected instead of overwritten

[dev-dependencies]
# Use this section for packages you want Nodus to resolve in the current repo,
# but not re-export when this package is consumed by another Nodus workspace.
tooling = { path = "vendor/tooling", components = ["skills"] }

# [dependencies.exact_pin]
# Uncomment this style when you want a Git dependency fixed to one exact commit.
# This expanded form is equivalent to the inline-table form under `[dependencies]`.
# url = "https://github.com/acme/example-package.git"
# revision = "0123456789abcdef0123456789abcdef01234567"

# [launch_hooks]
# Uncomment only if you want compatible adapters to auto-run sync on startup.
# Current manifest validation requires this to be `true` when set.
# sync_on_startup = true
