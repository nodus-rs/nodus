name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to build and upload assets for
        required: true
        type: string

permissions:
  contents: write

jobs:
  binaries:
    name: Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: nodus
            archive_ext: tar.gz
            linker: ""
            linker_package: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: nodus
            archive_ext: tar.gz
            linker: aarch64-linux-gnu-gcc
            linker_package: gcc-aarch64-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: nodus
            archive_ext: tar.gz
            linker: ""
            linker_package: ""
          - os: macos-15
            target: aarch64-apple-darwin
            binary_name: nodus
            archive_ext: tar.gz
            linker: ""
            linker_package: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: nodus.exe
            archive_ext: zip
            linker: ""
            linker_package: ""

    env:
      RELEASE_TAG: ${{ inputs.tag_name || github.event.release.tag_name }}
      ASSET_BASENAME: nodus-${{ inputs.tag_name || github.event.release.tag_name }}-${{ matrix.target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker
        if: matrix.linker_package != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y "${{ matrix.linker_package }}"

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.linker }}" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="${{ matrix.linker }}"
          fi
          cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package release archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          staging_dir="dist/${ASSET_BASENAME}"
          mkdir -p "${staging_dir}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${staging_dir}/nodus"
          cp README.md LICENSE "${staging_dir}/"
          tar -C dist -czf "dist/${ASSET_BASENAME}.tar.gz" "${ASSET_BASENAME}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${ASSET_BASENAME}.tar.gz" > "dist/${ASSET_BASENAME}.tar.gz.sha256"
          else
            shasum -a 256 "dist/${ASSET_BASENAME}.tar.gz" > "dist/${ASSET_BASENAME}.tar.gz.sha256"
          fi

      - name: Package release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stagingDir = "dist/${env:ASSET_BASENAME}"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$stagingDir/nodus.exe"
          Copy-Item README.md, LICENSE $stagingDir
          Compress-Archive -Path "$stagingDir/*" -DestinationPath "dist/${env:ASSET_BASENAME}.zip" -Force
          $hash = (Get-FileHash "dist/${env:ASSET_BASENAME}.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${env:ASSET_BASENAME}.zip" | Out-File -Encoding ascii "dist/${env:ASSET_BASENAME}.zip.sha256"

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/${{ env.ASSET_BASENAME }}.${{ matrix.archive_ext }}
            dist/${{ env.ASSET_BASENAME }}.${{ matrix.archive_ext }}.sha256
