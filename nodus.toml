name = "nodus"
content_roots = ["plugin"]
publish_root = true
[mcp_servers.nodus]
command = "nodus"
args = ["mcp", "serve"]

[adapters]
enabled = ["claude", "codex"]
[[hooks]]
id = "nodus.sync_on_startup"
event = "session_start"
[hooks.matcher]
sources = ["startup", "resume"]
[hooks.handler]
type = "command"
command = "nodus sync"

[dev-dependencies]
ena = { github = "oops-rs/ena", branch = "main" }
fuli = { github = "oops-rs/fuli", branch = "main" }
